<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kissan Smart | Scientific Farming</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
</head>
<body>
    <header><h1>Kissan Smart Platform</h1></header>
    
    <main class="container">
        <section id="disease">
            <h2>AI Disease Tracker</h2>
            <input type="file" id="leafUpload" accept="image/*">
            <button onclick="detectDisease()">Analyze Leaf Health</button>
            <div id="diseaseResult" class="info-card"></div>
        </section>

        <section id="community">
            <h2>Farmer Community (Live)</h2>
            <div id="chatMessages" class="chat-box"></div>
            <input type="text" id="userName" placeholder="Your Name">
            <input type="text" id="userMsg" placeholder="Ask a question...">
            <button onclick="sendChatMessage()">Send</button>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
